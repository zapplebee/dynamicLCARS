version: "1"

secrets:
  - name: docker_username
    key: zapplebee/docker_username
    engine: native
    type: org
  - name: docker_password
    key: zapplebee/docker_password
    engine: native
    type: org
  - name: github_token
    key: zapplebee/github_token
    engine: native
    type: org

services:
  - name: ssh-fixture
    image: alpine:latest
    pull: always
    entrypoint:
      - /bin/sh
      - -c
      - "until [ -f ${VELA_WORKSPACE}/tests/ci/start-ssh-fixture.sh ]; do sleep 1; done && /bin/sh ${VELA_WORKSPACE}/tests/ci/start-ssh-fixture.sh"

  - name: dynamic-lcars
    image: node:24-bookworm
    pull: always
    entrypoint:
      - /bin/sh
      - -c
      - "until [ -f ${VELA_WORKSPACE}/tests/ci/start-app.sh ]; do sleep 1; done && /bin/sh ${VELA_WORKSPACE}/tests/ci/start-app.sh"

steps:
  - name: wait-for-services
    image: alpine:latest
    pull: always
    commands:
      - /bin/sh ${VELA_WORKSPACE}/tests/ci/wait-for-services.sh

  - name: cypress
    image: cypress/included:latest
    pull: always
    environment:
      CYPRESS_BASE_URL: http://dynamic-lcars:1701
    commands:
      - cd ${VELA_WORKSPACE} && cypress run --browser chrome

  - name: publish-push
    ruleset:
      event: push
    image: target/vela-docker:latest
    pull: always
    secrets: [docker_username, docker_password]
    parameters:
      registry: harbor.prettybird.zapplebee.online
      repo: harbor.prettybird.zapplebee.online/library/dynamic-lcars
      tags:
        - harbor.prettybird.zapplebee.online/library/dynamic-lcars:latest
        - harbor.prettybird.zapplebee.online/library/dynamic-lcars:${VELA_BUILD_COMMIT:0:8}

  - name: publish-tag
    ruleset:
      event: tag
    image: target/vela-docker:latest
    pull: always
    secrets: [docker_username, docker_password]
    parameters:
      registry: harbor.prettybird.zapplebee.online
      repo: harbor.prettybird.zapplebee.online/library/dynamic-lcars
      tags:
        - harbor.prettybird.zapplebee.online/library/dynamic-lcars:${VELA_BUILD_TAG##v}

  - name: build-binary-tag
    ruleset:
      event: tag
    image: oven/bun:1
    pull: always
    commands:
      - cd ${VELA_WORKSPACE} && bun install --frozen-lockfile
      - cd ${VELA_WORKSPACE} && bun run build:binary
      - cd ${VELA_WORKSPACE} && cp dist-bin/dynamic-lcars dist-bin/dynamic-lcars-linux-x64

  - name: upload-binary-tag
    ruleset:
      event: tag
    image: target/vela-github-release:v0.5.0
    pull: always
    secrets: [github_token]
    parameters:
      action: upload
      files: [ dist-bin/dynamic-lcars-linux-x64 ]
      tag: ${VELA_BUILD_TAG}
      clobber: true
